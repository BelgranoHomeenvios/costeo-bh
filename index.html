<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costeo · Belgrano Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#1a2332; --blue:#2d6cdf; --ink:#1f2937; --ink-soft:#6b7280;
    --line:#e5e7eb; --paper:#f6f7f9; --sage:#3d7a5d; --sage-soft:#e8f2ec;
    --red:#c0392b; --red-soft:#fdecea; --amber:#b45309; --amber-soft:#fef3c7;
    --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;}

  /* ---------- LOGIN ---------- */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:linear-gradient(160deg,#1a2332 0%,#2a3a52 100%);}
  .login-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;
    box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .login-brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .login-title{font-size:20px;font-weight:700;color:var(--navy);}
  .login-sub{font-size:13px;color:var(--ink-soft);margin-bottom:28px;}
  .login-err{background:var(--red-soft);color:var(--red);padding:10px 12px;border-radius:8px;

  .login-err.show{display:block;}

  /* ---------- SHELL ---------- */
  .topbar{background:var(--navy);color:#fff;height:56px;display:flex;align-items:center;
    justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:20;}
  .tb-left{display:flex;align-items:center;gap:10px;}
  .brand-badge{width:30px;height:30px;border-radius:7px;background:var(--blue);display:flex;
    align-items:center;justify-content:center;font-weight:700;font-size:12px;}
  .brand-name{font-weight:600;font-size:15px;}
  .brand-dim{opacity:.6;font-weight:400;}
  .tb-right{display:flex;align-items:center;gap:14px;font-size:12.5px;opacity:.85;}
  .btn-logout{background:rgba(255,255,255,.12);border:none;color:#fff;padding:6px 12px;
    border-radius:7px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;}

  .tabbar{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 16px;

  .tab:hover{color:var(--ink);}
  .tab.active{color:var(--navy);}
  .tab.active::after{content:"";position:absolute;left:14px;right:14px;bottom:0;height:2.5px;

  .subtabbar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}

  .chip{padding:5px 12px;border-radius:20px;border:1px solid var(--line);background:#fff;

  .chip:hover{border-color:var(--blue);}
  .chip-on{background:var(--blue);color:#fff;border-color:var(--blue);}
  .chip-static{cursor:default;display:inline-flex;align-items:center;gap:6px;}
  .chip-x{border:none;background:none;color:var(--ink-soft);cursor:pointer;padding:0;line-height:1;}

  .main{max-width:1160px;margin:0 auto;padding:28px 20px 60px;}
  .page-eyebrow{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--blue);
    letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
  .page-title{font-size:26px;font-weight:700;color:var(--navy);margin-bottom:6px;}
  .page-desc{font-size:13.5px;color:var(--ink-soft);max-width:640px;margin-bottom:24px;}

  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:18px;}
  .card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;

  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;
    letter-spacing:.05em;padding:0 10px 10px;border-bottom:1px solid var(--line);}
  td{padding:12px 10px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .num{text-align:right;font-family:var(--mono);}
  th.num{text-align:right;font-family:var(--sans);}

  .btn-primary{background:var(--navy);color:#fff;border:none;padding:10px 18px;border-radius:8px;

  .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
  .btn-sm{padding:7px 13px;font-size:12.5px;}
  .icon-btn{background:none;border:none;color:var(--ink-soft);font-family:var(--sans);font-size:12.5px;
    font-weight:600;cursor:pointer;padding:4px 7px;border-radius:5px;}
  .icon-btn:hover{background:var(--paper);color:var(--ink);}
  .add-line-btn{width:100%;background:none;border:1.5px dashed var(--line);color:var(--blue);
    padding:10px;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;}
  .add-line-btn:hover{border-color:var(--blue);background:#f5f8fe;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
  input,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;
    font-family:var(--sans);font-size:13.5px;color:var(--ink);background:#fff;}
  input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,108,223,.1);}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .helper{font-size:12px;color:var(--ink-soft);line-height:1.5;margin-bottom:12px;}
  .section-label{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;
    letter-spacing:.06em;margin:20px 0 10px;}
  .check-row{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--ink-soft);
    background:var(--paper);padding:10px 12px;border-radius:8px;margin:14px 0;cursor:pointer;line-height:1.4;}
  .check-row input{width:auto;margin-top:2px;}
  .line-item-row{display:grid;grid-template-columns:1fr 110px 34px;gap:8px;margin-bottom:8px;align-items:center;}

  .modal-backdrop{position:fixed;inset:0;background:rgba(26,35,50,.5);z-index:50;display:flex;
    align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
  .modal{background:#fff;border-radius:14px;padding:26px;width:100%;max-width:560px;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .modal-title{font-size:18px;font-weight:700;color:var(--navy);}
  .modal-close{background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;}

  .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
  .prod-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;}
  .prod-card:hover{border-color:var(--blue);box-shadow:0 3px 12px rgba(0,0,0,.06);}
  .prod-cat{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--blue);
    text-transform:uppercase;letter-spacing:.06em;}
  .prod-name{font-size:15px;font-weight:700;color:var(--navy);margin:5px 0;}
  .prod-dims{font-size:12px;color:var(--ink-soft);margin-bottom:10px;}
  .prod-cost{font-family:var(--mono);font-size:19px;font-weight:600;color:var(--navy);}
  .prod-actions{margin-top:12px;display:flex;gap:4px;}

  .ticket{background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px;}
  .breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;
    border-bottom:1px solid var(--line);}
  .breakdown-row .label{font-size:13.5px;color:var(--ink);}
  .breakdown-row .amt{font-family:var(--mono);font-size:14px;font-weight:600;}
  .breakdown-row .pct{font-family:var(--mono);font-size:11px;color:var(--ink-soft);
    margin-left:10px;min-width:44px;display:inline-block;text-align:right;}
  .total-row{display:flex;justify-content:space-between;align-items:center;padding-top:16px;margin-top:6px;}
  .total-row .label{font-size:14px;font-weight:700;color:var(--navy);}
  .total-row .amt{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--navy);}

  .pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;
    background:var(--sage-soft);color:var(--sage);}
  .missing-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;
    background:var(--red-soft);color:var(--red);margin-left:7px;}
  .var-badge{font-family:var(--mono);font-size:10.5px;font-weight:600;margin-top:3px;}
  .var-up{color:var(--red);} .var-down{color:var(--sage);}
  .warn-box{background:var(--amber-soft);border:1px solid #fcd34d;color:var(--amber);padding:12px 14px;
    border-radius:9px;font-size:13px;margin-bottom:18px;line-height:1.5;}
  .empty{text-align:center;padding:36px 20px;color:var(--ink-soft);font-size:13.5px;}
  .loading{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .back-link{background:none;border:none;color:var(--blue);font-family:var(--sans);font-size:13px;
    font-weight:600;cursor:pointer;padding:0;margin-bottom:14px;}
  .detail-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;}

  /* Productos: barra de modelos + matriz de variantes */
  .prod-layout{display:grid;grid-template-columns:170px 1fr;gap:18px;align-items:start;}
  .modelo-nav{display:flex;flex-direction:column;gap:3px;}
  .modelo-btn{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;
    border:none;background:none;border-radius:8px;font-family:var(--sans);font-size:13.5px;
    font-weight:600;color:var(--ink-soft);cursor:pointer;text-align:left;width:100%;}
  .modelo-btn:hover{background:#fff;color:var(--ink);}
  .modelo-btn.active{background:#fff;color:var(--navy);border:1px solid var(--line);
    box-shadow:inset 2px 0 0 var(--blue);}
  .modelo-n{font-family:var(--mono);font-size:11px;color:var(--ink-soft);font-weight:500;}
  .espejo-bar{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .espejo-lbl{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;
    letter-spacing:.06em;margin-right:4px;}
  .espejo-de{font-weight:500;text-transform:none;letter-spacing:0;opacity:.75;}
  .matriz{width:100%;}
  .matriz th{padding:14px 16px 10px;}
  .matriz td{padding:0;}
  .matriz td:first-child{padding:14px 16px;}
  .dim-prof{display:block;font-size:11px;color:var(--ink-soft);font-weight:400;margin-top:2px;}
  .celda{cursor:pointer;padding:12px 16px !important;transition:background .12s;}
  .celda:hover{background:#f5f8fe;}
  .celda-costo{font-family:var(--mono);font-size:14.5px;font-weight:600;color:var(--navy);display:block;}
  .celda-warn{font-size:10px;font-weight:600;color:var(--red);display:block;margin-top:3px;}
  .var-selector{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:20px;padding:14px 16px;
    background:#fff;border:1px solid var(--line);border-radius:10px;}
  .var-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .var-lbl{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;
    letter-spacing:.06em;margin-right:2px;}

  @media(max-width:820px){.detail-grid,.row-2,.prod-layout{grid-template-columns:1fr;}}
</style>

<body>
<div id="root"><div class="loading">Cargando…</div></div>

<script>
/* ══════════════════════════════════════════════════════════════
   ⬇️  PEGÁ ACÁ TUS CREDENCIALES DE SUPABASE  ⬇️
   Settings → API → Project URL y anon public key.
   (La anon key es pública por diseño: lo que protege es el RLS.
    NUNCA pegues acá la service_role.)
   ══════════════════════════════════════════════════════════════ */
const SUPABASE_URL  = "https://bbxyoojlfcaxbkdsqlyg.supabase.co";
const SUPABASE_ANON = "sb_publishable_6IImUqLs0mNBLkNpp64dyw_P7dxvWPL";
/* ══════════════════════════════════════════════════════════════ */

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let state = {
  user:null, ready:false,
  tab:'products', materialsSubtab:'placas', familiaFilter:'',
  materiales:[], insumos:[], herrajes:[], kits:[], roles:[], categorias:[], productos:[],
  config:{carga_laboral_pct:38, unidades:['ud','m','litro','kg','par','juego','plancha']},
  historial:[],
  modal:null, productDetail:null, search:'',
  modeloSel:null,           // modelo activo en la barra lateral
  espejoSel:0,              // 0 | 1 | 2 puertas espejadas
  variante:{mat:'blanco', esp:0}   // variante que se está viendo en el detalle
};

/* ---------- VARIANTES ----------
   El ancho es una receta base (cada uno consume distinto).
   El material es un swap. El espejo saca melamina y mete espejo. */
const MATERIALES_VAR = [
  {id:'blanco', label:'Mel blanco', placa:'Melamina blanco 18mm',        tapa:'Tapacanto mel blanco 22mm'},
  {id:'madera', label:'Mel madera', placa:'Melamina texturada (madera)', tapa:'Tapacanto madera 22mm'},
];
const byNameMat = n => state.materiales.find(x=>x.nombre===n);
const byNameIns = n => state.insumos.find(x=>x.nombre===n);

// Corredizo = tiene puertas corredizas. Solo esos admiten espejo.
function esCorredizo(p){ return (p.puertas||0) > 0; }
// Área de UNA hoja: el ancho se reparte entre las puertas, + 5cm de solape
function areaPuerta(p){
  const n = p.puertas||0;
  if(!n || !p.ancho || !p.alto) return 0;
  return ((p.ancho/n + 5)/100) * (p.alto/100);
}
// Devuelve una copia del producto con la variante aplicada
function aplicarVariante(p, v){
  const q = JSON.parse(JSON.stringify(p));
  q.materiales = q.materiales||[]; q.insumos = q.insumos||[];
  const base = MATERIALES_VAR[0], sel = MATERIALES_VAR.find(m=>m.id===v.mat) || base;

  if(sel.id!==base.id){
    const de = byNameMat(base.placa), a = byNameMat(sel.placa);
    if(de && a) q.materiales.forEach(l=>{ if(l.material_id===de.id) l.material_id = a.id; });
    const td = byNameIns(base.tapa), ta = byNameIns(sel.tapa);
    if(td && ta) q.insumos.forEach(l=>{ if(l.insumo_id===td.id) l.insumo_id = ta.id; });
  }
  if(v.esp>0 && esCorredizo(p)){
    const mel = byNameMat(sel.placa), esp = byNameMat('Espejo');
    const area = +(areaPuerta(p) * v.esp).toFixed(2);
    const linea = mel ? q.materiales.find(l=>l.material_id===mel.id) : null;
    if(linea) linea.m2 = Math.max(0, +(linea.m2 - area).toFixed(2));
    if(esp) q.materiales.push({material_id:esp.id, m2:area});
  }
  return q;
}
const varLabel = v => {
  const m = MATERIALES_VAR.find(x=>x.id===v.mat)?.label || '';
  return m + (v.esp>0 ? ` · ${v.esp} espejo${v.esp>1?'s':''}` : '');
};

const fmt  = n => (isFinite(n)?n:0).toLocaleString('es-AR',{maximumFractionDigits:0});
const fmt2 = n => (isFinite(n)?n:0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
const val  = id => { const e=document.getElementById(id); return e?e.value.trim():''; };
const numVal = id => { const e=document.getElementById(id); return e?(parseFloat(e.value)||0):0; };
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- AUTH ---------- */
async function initAuth(){
  const {data:{session}} = await sb.auth.getSession();
  state.user = session?.user || null;
  if(state.user){ await loadAll(); } else { state.ready=true; render(); }
  sb.auth.onAuthStateChange((_e,s)=>{
    const was = !!state.user;
    state.user = s?.user || null;
    if(state.user && !was) loadAll();
    if(!state.user) render();
  });
}
async function doLogin(){
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('login-err');
  btn.disabled = true; btn.textContent = 'Entrando…';
  const {error} = await sb.auth.signInWithPassword({
    email: val('login-email'), password: document.getElementById('login-pass').value
  });
  if(error){
    err.textContent = 'Email o contraseña incorrectos.';
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}
async function doLogout(){ await sb.auth.signOut(); state.ready=true; render(); }

/* ---------- DATA ---------- */
async function loadAll(){
  state.ready = false; render();
  const [mat,ins,her,kit,rol,cat,pro,cfg,his] = await Promise.all([
    sb.from('materiales').select('*').order('nombre'),
    sb.from('insumos').select('*').order('nombre'),
    sb.from('herrajes').select('*').order('nombre'),
    sb.from('kits').select('*').order('nombre'),
    sb.from('roles_mano_obra').select('*').order('nombre'),
    sb.from('categorias').select('*').order('nombre'),
    sb.from('productos').select('*').order('nombre'),
    sb.from('config').select('*').eq('id',1).single(),
    sb.from('historial_precios').select('*').order('fecha',{ascending:false}).limit(100),
  ]);
  state.materiales = mat.data||[];  state.insumos = ins.data||[];
  state.herrajes   = her.data||[];  state.kits    = kit.data||[];
  state.roles      = rol.data||[];  state.categorias = cat.data||[];
  state.productos  = pro.data||[];  state.historial  = his.data||[];
  if(cfg.data) state.config = cfg.data;
  state.ready = true; render();
}

async function save(tabla, id, data, esCorreccion){
  if(esCorreccion) await sb.rpc('set_config',{setting_name:'app.es_correccion',new_value:'true',is_local:true}).catch(()=>{});
  const q = id ? sb.from(tabla).update(data).eq('id',id) : sb.from(tabla).insert(data);
  const {error} = await q;
  if(error){ alert('Error al guardar: '+error.message); return; }
  state.modal = null;
  await loadAll();
}
async function del(tabla, id){
  if(!confirm('¿Borrar este ítem?')) return;
  const {error} = await sb.from(tabla).delete().eq('id',id);
  if(error){ alert('No se puede borrar: puede estar en uso por un producto.'); return; }
  await loadAll();
}

/* ---------- MOTOR DE COSTEO ---------- */
function costPerM2(m){
  const area = (m.ancho/100)*(m.alto/100)*(1-(m.desperdicio||0)/100);
  return area>0 ? m.precio/area : 0;
}
function costPerUnit(i){
  return i.contenido>0 ? (i.precio_compra||0)/i.contenido : 0;
}
function kitCost(k){
  return (k.items||[]).reduce((s,li)=>{
    const h = state.herrajes.find(x=>x.id===li.herraje_id);
    return s + (h ? h.precio*li.cantidad : 0);
  },0);
}
function productCost(p){
  const materiales = (p.materiales||[]).reduce((s,l)=>{
    const m = state.materiales.find(x=>x.id===l.material_id);
    return s + (m ? costPerM2(m)*l.m2 : 0);
  },0);
  const insumos = (p.insumos||[]).reduce((s,l)=>{
    const i = state.insumos.find(x=>x.id===l.insumo_id);
    return s + (i ? costPerUnit(i)*l.cantidad : 0);
  },0);
  let herrajes = 0;
  if(p.kit_id){
    const k = state.kits.find(x=>x.id===p.kit_id);
    if(k) herrajes += kitCost(k);
  }
  herrajes += (p.sueltos||[]).reduce((s,l)=>{
    const h = state.herrajes.find(x=>x.id===l.herraje_id);
    return s + (h ? h.precio*l.cantidad : 0);
  },0);
  const moBase = (p.horas||[]).reduce((s,l)=>{
    const r = state.roles.find(x=>x.id===l.rol_id);
    return s + (r ? r.tarifa*l.horas : 0);
  },0);
  const carga = state.config.carga_laboral_pct||0;
  const manoDeObra = moBase*(1+carga/100);
  const otros = p.otros||0;
  return {materiales,insumos,herrajes,manoDeObra,moBase,otros,
          total: materiales+insumos+herrajes+manoDeObra+otros};
}
// Detecta si el costo está incompleto por precios en $0
function faltantes(p){
  const out = [];
  (p.materiales||[]).forEach(l=>{ const m=state.materiales.find(x=>x.id===l.material_id); if(m&&!m.precio) out.push(m.nombre); });
  (p.insumos||[]).forEach(l=>{ const i=state.insumos.find(x=>x.id===l.insumo_id); if(i&&!i.precio_compra) out.push(i.nombre); });
  (p.sueltos||[]).forEach(l=>{ const h=state.herrajes.find(x=>x.id===l.herraje_id); if(h&&!h.precio) out.push(h.nombre); });
  if(p.kit_id){ const k=state.kits.find(x=>x.id===p.kit_id);
    (k?.items||[]).forEach(li=>{ const h=state.herrajes.find(x=>x.id===li.herraje_id); if(h&&!h.precio) out.push(h.nombre); }); }
  (p.horas||[]).forEach(l=>{ const r=state.roles.find(x=>x.id===l.rol_id); if(r&&!r.tarifa&&l.horas>0) out.push(r.nombre+' (tarifa)'); });
  return [...new Set(out)];
}

function productsPage(){
  const modelos = [...new Set(state.productos.map(p=>p.modelo).filter(Boolean))].sort();
  const sueltos = state.productos.filter(p=>!p.modelo);
  if(!state.modeloSel && modelos.length) state.modeloSel = modelos[0];

  const lista = state.productos
    .filter(p => p.modelo===state.modeloSel)
    .sort((a,b)=>(a.ancho||0)-(b.ancho||0));

  const maxPuertas = Math.max(0, ...lista.map(p=>p.puertas||0));
  if(state.espejoSel > maxPuertas) state.espejoSel = 0;

  const nav = `
    <aside class="modelo-nav">
      ${modelos.map(m=>{
        const n = state.productos.filter(p=>p.modelo===m).length;
        return `<button class="modelo-btn ${state.modeloSel===m?'active':''}" data-modelo="${esc(m)}">
          ${esc(m)} <span class="modelo-n">${n}</span></button>`;
      }).join('')}
      ${sueltos.length?`<button class="modelo-btn ${state.modeloSel==='__otros'?'active':''}" data-modelo="__otros">
        Otros <span class="modelo-n">${sueltos.length}</span></button>`:''}
      <button class="add-line-btn" style="margin-top:10px;" data-new="producto">+ Producto</button>
    </aside>`;

  const espejoBar = maxPuertas>0 ? `
    <div class="espejo-bar">
      <span class="espejo-lbl">Puertas espejadas <span class="espejo-de">de ${maxPuertas}</span></span>
      ${Array.from({length:maxPuertas+1},(_,n)=>`<button class="chip ${state.espejoSel===n?'chip-on':''}" data-espejo="${n}">
        ${n===0?'Ninguna':n===1?'1 puerta':n+' puertas'}</button>`).join('')}
    </div>` : '';

  const cuerpo = lista.length ? `
    <table class="matriz">
      <thead><tr>
        <th style="width:26%;">Medida</th>
        ${MATERIALES_VAR.map(m=>`<th class="num">${m.label}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${lista.map(p=>`<tr>
          <td>
            <strong>${p.ancho}×${p.alto}</strong>
            <span class="dim-prof">prof ${p.profundidad||'—'}${p.puertas?` · ${p.puertas} puertas`:''}</span>
          </td>
          ${MATERIALES_VAR.map(m=>{
            const v = {mat:m.id, esp:state.espejoSel};
            const q = aplicarVariante(p, v);
            const c = productCost(q);
            const f = faltantes(q);
            return `<td class="num celda" data-cell="${p.id}|${m.id}|${state.espejoSel}">

            </td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>` : empty('No hay productos en este modelo.');

  return head('02 · Productos','Productos',
    'Cada medida es una receta. El material y el espejo son variantes: cambian el costo sin duplicar el producto.')
    + `<div class="prod-layout">${nav}
        <section>
          ${espejoBar}
          <div class="card" style="padding:0;overflow:hidden;">${cuerpo}</div>
        </section>
      </div>`;

      <div class="helper" style="margin-top:14px;">Este es el <strong>costo directo</strong>. Todavía no incluye la estructura del taller (alquiler, luz, amortización), así que no es el costo total: no le pongas margen como si lo fuera.</div>

      ${(p.materiales||[]).map(l=>{const m=state.materiales.find(x=>x.id===l.material_id);
        return `<div class="breakdown-row" style="font-size:13px;"><span class="label">${esc(m?.nombre||'—')}</span>
        <span class="amt">${l.m2} m² · $${fmt(m?costPerM2(m)*l.m2:0)}</span></div>`;}).join('')||'<div class="helper">Sin materiales.</div>'}
      <div class="section-label">Insumos</div>
      ${(p.insumos||[]).map(l=>{const i=state.insumos.find(x=>x.id===l.insumo_id);
        return `<div class="breakdown-row" style="font-size:13px;"><span class="label">${esc(i?.nombre||'—')}</span>
        <span class="amt">${l.cantidad} ${esc(i?.unidad||'')} · $${fmt(i?costPerUnit(i)*l.cantidad:0)}</span></div>`;}).join('')||'<div class="helper">Sin insumos.</div>'}
      <div class="section-label">Herrajes</div>
      ${p.kit_id?(()=>{const k=state.kits.find(x=>x.id===p.kit_id);
        return `<div class="breakdown-row" style="font-size:13px;"><span class="label">${esc(k?.nombre||'—')} <span class="pill">kit</span></span>
        <span class="amt">$${fmt(k?kitCost(k):0)}</span></div>`;})():''}
      ${(p.sueltos||[]).map(l=>{const h=state.herrajes.find(x=>x.id===l.herraje_id);
        return `<div class="breakdown-row" style="font-size:13px;"><span class="label">${esc(h?.nombre||'—')}</span>
        <span class="amt">${l.cantidad} × $${fmt(h?.precio||0)}</span></div>`;}).join('')}
      ${!p.kit_id&&!(p.sueltos||[]).length?'<div class="helper">Sin herrajes.</div>':''}
      <div class="section-label">Mano de obra</div>
      ${(p.horas||[]).map(l=>{const r=state.roles.find(x=>x.id===l.rol_id);
        return `<div class="breakdown-row" style="font-size:13px;"><span class="label">${esc(r?.nombre||'—')}</span>
        <span class="amt">${l.horas}h × $${fmt(r?.tarifa||0)}</span></div>`;}).join('')||'<div class="helper">Sin horas.</div>'}
    </div>
  </div>`;
}

// Config de cada tipo de línea dinámica: de dónde saca opciones y cómo se llama el campo
const LN = {
  materiales:{src:'materiales', fk:'material_id', qty:'m2',       ph:'m²'},
  insumos:   {src:'insumos',    fk:'insumo_id',   qty:'cantidad', ph:'cant.'},
  sueltos:   {src:'herrajes',   fk:'herraje_id',  qty:'cantidad', ph:'cant.'},
  horas:     {src:'roles',      fk:'rol_id',      qty:'horas',    ph:'horas'},
};
function lineRows(kind){
  const cfg = LN[kind];
  if(!state[cfg.src].length) return `<div class="helper">Primero cargá ${kind==='horas'?'roles en Mano de obra':kind+' en Materiales'}.</div>`;
  return (draft[kind]||[]).map((l,ix)=>`<div class="line-item-row">
    <select data-ln="${kind}" data-ix="${ix}" data-f="${cfg.fk}">
      ${state[cfg.src].map(o=>`<option value="${o.id}" ${o.id===l[cfg.fk]?'selected':''}>${esc(o.nombre)}</option>`).join('')}
    </select>
    <input type="number" step="0.01" data-ln="${kind}" data-ix="${ix}" data-f="${cfg.qty}" value="${l[cfg.qty]}" placeholder="${cfg.ph}">
    <button class="icon-btn" data-rmln="${kind}:${ix}">✕</button></div>`).join('');
}

/* ---------- EVENTS ---------- */
function bindLogin(){
  const b = document.getElementById('btn-login');
  if(b) b.onclick = doLogin;
  const p = document.getElementById('login-pass');
  if(p) p.onkeydown = e => { if(e.key==='Enter') doLogin(); };
}

function bindEvents(){
  document.getElementById('btn-logout').onclick = doLogout;
  document.querySelectorAll('[data-nav]').forEach(e=>e.onclick=()=>{
    state.tab=e.dataset.nav; state.productDetail=null; state.familiaFilter=''; render();});
  document.querySelectorAll('[data-subtab]').forEach(e=>e.onclick=()=>{
    state.materialsSubtab=e.dataset.subtab; state.familiaFilter=''; render();});
  document.querySelectorAll('[data-familia]').forEach(e=>e.onclick=()=>{
    state.familiaFilter=e.dataset.familia; render();});
  document.querySelectorAll('[data-new]').forEach(e=>e.onclick=()=>{
    state.modal={type:e.dataset.new,id:null}; render();});
  document.querySelectorAll('[data-edit]').forEach(e=>e.onclick=(ev)=>{
    ev.stopPropagation();
    const [t,i]=e.dataset.edit.split(':'); state.modal={type:t,id:i}; render();});
  document.querySelectorAll('[data-del]').forEach(e=>e.onclick=(ev)=>{
    ev.stopPropagation();
    const [t,i]=e.dataset.del.split(':'); del(t,i);});
  document.querySelectorAll('[data-view]').forEach(e=>e.onclick=()=>{
    state.productDetail=e.dataset.view; state.variante={mat:'blanco',esp:0}; render();});
  document.querySelectorAll('[data-modelo]').forEach(e=>e.onclick=()=>{
    state.modeloSel=e.dataset.modelo; state.espejoSel=0; render();});
  document.querySelectorAll('[data-espejo]').forEach(e=>e.onclick=()=>{
    state.espejoSel=+e.dataset.espejo; render();});
  document.querySelectorAll('[data-cell]').forEach(e=>e.onclick=()=>{
    const [id,mat,esp]=e.dataset.cell.split('|');
    state.productDetail=id; state.variante={mat, esp:+esp}; render();});
  document.querySelectorAll('[data-vmat]').forEach(e=>e.onclick=()=>{
    state.variante={...state.variante, mat:e.dataset.vmat}; render();});
  document.querySelectorAll('[data-vesp]').forEach(e=>e.onclick=()=>{
    state.variante={...state.variante, esp:+e.dataset.vesp}; render();});
  document.querySelectorAll('[data-dup]').forEach(e=>e.onclick=async(ev)=>{
    ev.stopPropagation();
    const p = state.productos.find(x=>x.id===e.dataset.dup);
    const {id,created_at,updated_at,updated_by,...copy} = p;
    copy.nombre += ' (copia)';
    await save('productos',null,copy);});

  const back = document.getElementById('back');
  if(back) back.onclick=()=>{state.productDetail=null; render();};
  const s = document.getElementById('search');
  if(s) s.oninput = e => { state.search=e.target.value; render();
    const el=document.getElementById('search'); el.focus(); el.selectionStart=el.value.length; };

  // Config
  const sc = document.getElementById('save-carga');
  if(sc) sc.onclick = async()=>{
    await sb.from('config').update({carga_laboral_pct:numVal('cfg-carga')}).eq('id',1);
    await loadAll();};
  const au = document.getElementById('add-unidad');
  if(au) au.onclick = async()=>{
    const v = val('cfg-unidad');
    if(!v || state.config.unidades.includes(v)) return;
    await sb.from('config').update({unidades:[...state.config.unidades,v]}).eq('id',1);
    await loadAll();};
  document.querySelectorAll('[data-delu]').forEach(e=>e.onclick=async()=>{
    await sb.from('config').update({unidades:state.config.unidades.filter(u=>u!==e.dataset.delu)}).eq('id',1);
    await loadAll();});

  // Modal
  const bd = document.getElementById('backdrop');
  if(bd){
    bd.onclick = e => { if(e.target.id==='backdrop'){state.modal=null; render();} };
    document.getElementById('modal-close').onclick = ()=>{state.modal=null; render();};
  }
  bindLines();
  bindSave();
}

function bindLines(){
  // líneas dinámicas del producto
  document.querySelectorAll('[data-add]').forEach(e=>e.onclick=()=>{
    const k = e.dataset.add, cfg = LN[k];
    draft[k] = draft[k]||[];
    draft[k].push({[cfg.fk]: state[cfg.src][0]?.id||'', [cfg.qty]:0});
    document.getElementById('ln-'+k).innerHTML = lineRows(k);
    bindLines();});
  document.querySelectorAll('[data-ln]').forEach(e=>e.onchange=()=>{
    const k=e.dataset.ln, ix=+e.dataset.ix, f=e.dataset.f;
    draft[k][ix][f] = e.type==='number' ? (parseFloat(e.value)||0) : e.value;});
  document.querySelectorAll('[data-rmln]').forEach(e=>e.onclick=()=>{
    const [k,ix]=e.dataset.rmln.split(':');
    draft[k].splice(+ix,1);
    document.getElementById('ln-'+k).innerHTML = lineRows(k);
    bindLines();});
  // líneas del kit
  const ak = document.getElementById('add-kit');
  if(ak) ak.onclick = ()=>{
    draft.items.push({herraje_id:state.herrajes[0]?.id||'', cantidad:0});
    document.getElementById('kit-lines').innerHTML = kitLines();
    bindLines();};
  document.querySelectorAll('[data-kl]').forEach(e=>e.onchange=()=>{
    const ix=+e.dataset.kl, f=e.dataset.f;
    draft.items[ix][f] = e.type==='number' ? (parseFloat(e.value)||0) : e.value;});
  document.querySelectorAll('[data-rmkl]').forEach(e=>e.onclick=()=>{
    draft.items.splice(+e.dataset.rmkl,1);
    document.getElementById('kit-lines').innerHTML = kitLines();
    bindLines();});
}

function bindSave(){
  const btn = document.getElementById('save');
  if(!btn) return;
  const id = btn.dataset.id || null;
  const corr = ()=>{ const e=document.getElementById('f-corr'); return e?e.checked:false; };
  btn.onclick = async()=>{
    btn.disabled = true; btn.textContent = 'Guardando…';
    const t = state.modal.type;
    if(t==='material')  await save('materiales',id,{nombre:val('f-nombre'),familia:val('f-familia'),
        precio:numVal('f-precio'),ancho:numVal('f-ancho'),alto:numVal('f-alto'),desperdicio:numVal('f-desp')},corr());
    if(t==='insumo')    await save('insumos',id,{nombre:val('f-nombre'),familia:val('f-familia'),
        precio_compra:numVal('f-precio'),unidad:val('f-unidad'),contenido:numVal('f-contenido')},corr());
    if(t==='herraje')   await save('herrajes',id,{nombre:val('f-nombre'),familia:val('f-familia'),
        precio:numVal('f-precio'),unidad:val('f-unidad')},corr());
    if(t==='kit')       await save('kits',id,{nombre:val('f-nombre'),items:draft.items});
    if(t==='rol')       await save('roles_mano_obra',id,{nombre:val('f-nombre'),tarifa:numVal('f-tarifa')});
    if(t==='categoria'){
      const horas={};
      document.querySelectorAll('[data-cat-rol]').forEach(e=>{ const v=parseFloat(e.value)||0; if(v) horas[e.dataset.catRol]=v; });
      await save('categorias',id,{nombre:val('f-nombre'),horas});
    }
    if(t==='producto'){
      await save('productos',id,{nombre:val('f-nombre'),modelo:val('f-modelo')||null,
        puertas:parseInt(val('f-puertas'))||0,
        categoria_id:val('f-cat')||null,color:val('f-color'),
        ancho:numVal('f-ancho'),alto:numVal('f-alto'),profundidad:numVal('f-prof'),
        materiales:draft.materiales,insumos:draft.insumos,kit_id:val('f-kit')||null,
        sueltos:draft.sueltos,horas:draft.horas,otros:numVal('f-otros')});
      state.productDetail = null;
    }
  };
}

initAuth();
</script>
</body>
</html>
